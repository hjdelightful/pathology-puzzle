<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>病理切片3×3拖拽拼图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", Arial, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .puzzle-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }
        #puzzle-container {
            display: grid;
            grid-template-columns: repeat(3, 200px);
            grid-template-rows: repeat(3, 200px);
            gap: 2px;
            border: 3px solid #333;
            background-color: #fff;
        }
        .puzzle-slot {
            width: 200px;
            height: 200px;
            border: 1px solid #ddd;
            background-color: #fafafa;
        }
        .puzzle-piece {
            width: 200px;
            height: 200px;
            background-image: url('https://github.com/hjdelightful/pathology-puzzle/blob/main/%E5%9B%BE%E7%89%874.png?raw=true'); /* 替换为你的病理切片图链接 */
            background-size: 600px 600px;
            cursor: grab;
            transition: transform 0.1s ease;
        }
        .puzzle-piece:active {
            cursor: grabbing;
        }
        .reference-img {
            width: 300px;
            height: 300px;
            border: 2px solid #333;
            object-fit: cover;
        }
        #message {
            margin-top: 20px;
            font-size: 18px;
            color: #2c3e50;
            text-align: center;
            min-height: 27px;
        }
        button {
            margin-top: 15px;
            padding: 10px 25px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .dragging {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <h1>肝脏病理切片 3×3 拖拽拼图</h1>
    <div class="puzzle-wrapper">
        <div>
            <p style="margin-bottom: 10px; color: #666;">参考图：</p>
            <img src="https://github.com/hjdelightful/pathology-puzzle/blob/main/%E5%9B%BE%E7%89%874.png?raw=true" class="reference-img" alt="病理切片参考图">
        </div>
        <div id="puzzle-container"></div>
    </div>
    <div id="message"></div>
    <button id="restart">重新开始</button>

    <script>
        const size = 3;
        const totalPieces = size * size;
        let pieces = [];
        let slots = [];
        const container = document.getElementById('puzzle-container');
        const message = document.getElementById('message');
        const restartBtn = document.getElementById('restart');
        const imgUrl = 'https://github.com/hjdelightful/pathology-puzzle/blob/main/%E5%9B%BE%E7%89%874.png?raw=true'; // 替换为你的病理切片图链接

        // 初始化拼图
        function initPuzzle() {
            pieces = Array.from({length: totalPieces}, (_, i) => i);
            shuffle(pieces);
            renderPuzzle();
            message.textContent = '拖拽拼图块到正确位置，完成拼图！';
        }

        // 渲染拼图
        function renderPuzzle() {
            container.innerHTML = '';
            slots = [];

            // 创建空位
            for (let i = 0; i < totalPieces; i++) {
                const slot = document.createElement('div');
                slot.className = 'puzzle-slot';
                slot.dataset.index = i;
                container.appendChild(slot);
                slots.push(slot);
            }

            // 创建拼图块
            pieces.forEach((correctIndex, currentIndex) => {
                const piece = document.createElement('div');
                piece.className = 'puzzle-piece';
                piece.draggable = true;
                piece.dataset.correctIndex = correctIndex;
                piece.dataset.currentIndex = currentIndex;

                // 设置背景位置
                const row = Math.floor(correctIndex / size);
                const col = correctIndex % size;
                piece.style.backgroundPosition = `-${col * 200}px -${row * 200}px`;
                piece.style.backgroundImage = `url(${imgUrl})`;

                // 拖拽事件
                piece.addEventListener('dragstart', handleDragStart);
                piece.addEventListener('dragend', handleDragEnd);
                slots[currentIndex].appendChild(piece);
            });

            // 给空位添加拖放事件
            slots.forEach(slot => {
                slot.addEventListener('dragover', handleDragOver);
                slot.addEventListener('drop', handleDrop);
            });
        }

        let draggedPiece = null;
        let draggedFromIndex = null;

        function handleDragStart(e) {
            draggedPiece = e.target;
            draggedFromIndex = parseInt(draggedPiece.dataset.currentIndex);
            draggedPiece.classList.add('dragging');
        }

        function handleDragEnd(e) {
            draggedPiece.classList.remove('dragging');
            draggedPiece = null;
            draggedFromIndex = null;
        }

        function handleDragOver(e) {
            e.preventDefault();
        }

        function handleDrop(e) {
            e.preventDefault();
            const targetSlot = e.currentTarget;
            const targetIndex = parseInt(targetSlot.dataset.index);

            if (draggedPiece && draggedFromIndex !== targetIndex) {
                // 交换两个位置的拼图块
                const targetPiece = targetSlot.querySelector('.puzzle-piece');
                const fromSlot = slots[draggedFromIndex];

                fromSlot.appendChild(targetPiece);
                targetSlot.appendChild(draggedPiece);

                // 更新数据
                draggedPiece.dataset.currentIndex = targetIndex;
                if (targetPiece) {
                    targetPiece.dataset.currentIndex = draggedFromIndex;
                }

                // 检查是否完成
                if (isSolved()) {
                    message.textContent = '✅ 拼图完成！这是脂肪肝组织切片，可见大量脂肪空泡。';
                }
            }
        }

        // 检查是否完成
        function isSolved() {
            return slots.every((slot, i) => {
                const piece = slot.querySelector('.puzzle-piece');
                return piece && parseInt(piece.dataset.correctIndex) === i;
            });
        }

        // 打乱数组
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        restartBtn.addEventListener('click', initPuzzle);
        initPuzzle();
    </script>
</body>
</html>
